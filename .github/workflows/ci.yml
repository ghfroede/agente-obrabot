name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -q -m "not integration" --cov=src --cov-report=term-missing

      - name: Security audit
        run: uv run python scripts/audit_dependencies.py

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: obrabot
          POSTGRES_PASSWORD: obrabot
          POSTGRES_DB: obrabot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obrabot -d obrabot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://obrabot:obrabot@localhost:5432/obrabot
      INTEGRATION_DATABASE_URL: postgresql+asyncpg://obrabot:obrabot@localhost:5432/obrabot
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Integration tests
        run: uv run pytest -q -m integration
