<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Painel Obrabot{% endblock %}</title>
  <script src="/admin/static/htmx.min.js"></script>
  <style>
    /* ===== Obrabot design system — "Business" (Adobe-inspired) ===== */
    :root {
      color-scheme: light;
      /* surfaces */
      --bg: #ffffff; --bg-soft: #fafafa; --surface: #ffffff;
      --border: #e6e6e6; --border-strong: #d4d4d4;
      /* ink */
      --ink: #1f1f1f; --ink-2: #4b4b4b; --ink-3: #6e6e6e;
      /* accents */
      --blue: #1473e6; --blue-600: #0d66d0; --blue-700: #095aba; --blue-tint: #eaf2fe;
      --teal: #009a9a; --red: #fa0f00;
      /* hero / dark */
      --black: #0a0a0a; --black-2: #161616;
      /* gradient banner (roxo → magenta → laranja) */
      --grad: linear-gradient(120deg, #7a2ff2 0%, #d3318b 55%, #ff6a2b 100%);
      /* semantic */
      --ok: #2e7d46; --ok-bg: #e8f5ec; --ok-brd: #bfe3c9;
      --warn: #9a6300; --warn-bg: #fdf3e3; --warn-brd: #f2dcae;
      --bad: #c8261b; --bad-bg: #fdecea; --bad-brd: #f3c5c0;
      /* shape */
      --r-card: 18px; --r-field: 12px; --pill: 999px;
      --shadow-1: 0 1px 3px rgba(20,20,20,.08), 0 1px 2px rgba(20,20,20,.04);
      --shadow-2: 0 14px 38px rgba(20,20,20,.12), 0 4px 10px rgba(20,20,20,.06);
      --ease: cubic-bezier(.22,.61,.36,1); --spring: cubic-bezier(.34,1.4,.64,1);
      --z-nav: 100; --maxw: 1140px;
    }
    * { box-sizing: border-box; }
    ::selection { background: rgba(20,115,230,.18); color: inherit; }
    * { scrollbar-width: thin; scrollbar-color: #c9c9c9 transparent; }
    *::-webkit-scrollbar { width: 11px; height: 11px; }
    *::-webkit-scrollbar-thumb { background: #cfcfcf; border-radius: 999px; border: 3px solid transparent; background-clip: content-box; }
    *::-webkit-scrollbar-thumb:hover { background: #b3b3b3; background-clip: content-box; }

    body {
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0; color: var(--ink); background: var(--bg); line-height: 1.6; font-size: 16px;
      min-height: 100dvh; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }

    /* keyboard focus */
    a:focus-visible, .nav-link:focus-visible, .brand:focus-visible {
      outline: none; border-radius: 8px; box-shadow: 0 0 0 3px rgba(20,115,230,.45); text-decoration: none;
    }

    /* ===== top nav (branca, texto preto) ===== */
    nav {
      position: sticky; top: 0; z-index: var(--z-nav);
      display: flex; align-items: center; gap: .25rem; padding: .7rem 1.5rem;
      background: rgba(255,255,255,.85); -webkit-backdrop-filter: saturate(180%) blur(12px); backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .brand {
      display: flex; align-items: baseline; gap: .12rem; font-weight: 800; letter-spacing: -.02em;
      color: var(--ink); text-decoration: none; margin-right: 1.1rem; font-size: 1.18rem;
    }
    .brand .dot { color: var(--red); }
    .nav-link {
      display: inline-flex; align-items: center; gap: .35rem; color: var(--ink-2); text-decoration: none;
      font-weight: 600; font-size: .96rem; padding: .5rem .8rem; border-radius: var(--pill); position: relative;
      transition: background .18s var(--ease), color .18s var(--ease);
    }
    .nav-link svg { width: 16px; height: 16px; opacity: .85; }
    .nav-link:hover { background: #f2f2f2; color: var(--ink); }
    .nav-link[aria-current="page"] { color: var(--blue); background: var(--blue-tint); }
    nav .spacer { flex: 1; }
    nav form { margin: 0; }

    main { padding: 2.4rem 1.5rem 4rem; max-width: var(--maxw); margin: 0 auto; }
    main > * { animation: rise .5s var(--ease) both; }
    main > *:nth-child(1){animation-delay:.02s} main > *:nth-child(2){animation-delay:.07s}
    main > *:nth-child(3){animation-delay:.12s} main > *:nth-child(4){animation-delay:.17s}
    main > *:nth-child(5){animation-delay:.22s} main > *:nth-child(n+6){animation-delay:.26s}
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    /* ===== typography ===== */
    h1 { color: var(--ink); font-weight: 800; font-size: clamp(2rem, 4.2vw, 2.9rem);
      line-height: 1.08; letter-spacing: -.03em; margin: .2rem 0 1.2rem; }
    h2 { color: var(--ink); font-weight: 700; letter-spacing: -.02em; font-size: 1.4rem; }
    h3 { color: var(--ink); font-weight: 600; letter-spacing: -.01em; }
    .eyebrow { display: block; font-size: .76rem; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--blue); margin-bottom: .55rem; }
    .lead { font-size: 1.12rem; color: var(--ink-2); max-width: 56ch; }
    .muted { color: var(--ink-3); }

    /* ===== buttons — pill ===== */
    button, input[type=submit], a.btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
      font: inherit; font-weight: 600; cursor: pointer; text-decoration: none;
      padding: .62rem 1.45rem; border-radius: var(--pill); border: 1px solid transparent;
      background: var(--blue); color: #fff; box-shadow: var(--shadow-1);
      transition: background .18s var(--ease), transform .16s var(--spring), box-shadow .2s var(--ease);
    }
    button:hover, input[type=submit]:hover, a.btn:hover {
      background: var(--blue-600); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(20,115,230,.32);
    }
    button:active, input[type=submit]:active, a.btn:active { transform: translateY(0) scale(.97); }
    button:focus-visible, input[type=submit]:focus-visible, a.btn:focus-visible {
      outline: none; box-shadow: 0 0 0 3px rgba(20,115,230,.4);
    }
    /* button variants */
    .btn-light { background: #fff; color: var(--ink); border-color: #fff; }
    .btn-light:hover { background: #f0f0f0; }
    .btn-outline { background: transparent; color: #fff; border-color: rgba(255,255,255,.7); box-shadow: none; }
    .btn-outline:hover { background: rgba(255,255,255,.12); border-color: #fff; }
    .btn-ghost { background: transparent; color: var(--ink); border-color: var(--border-strong); box-shadow: none; }
    .btn-ghost:hover { background: #f5f5f5; color: var(--ink); }
    /* nav "Sair" → ghost pill on white */
    nav button { background: transparent; color: var(--ink); border: 1px solid var(--border-strong);
      box-shadow: none; padding: .5rem 1.1rem; }
    nav button:hover { background: #f5f5f5; transform: none; box-shadow: none; }

    main a:not(.btn):not(.metric) { color: var(--blue); text-decoration: none; font-weight: 600; transition: color .15s var(--ease); }
    main a:not(.btn):not(.metric):hover { color: var(--blue-700); text-decoration: underline; text-underline-offset: 3px; }

    /* legacy selectors used in templates → render as pill links */
    main p > a[href$="/nova"], td a[href*="/editar"] {
      display: inline-flex; align-items: center; color: #fff !important; text-decoration: none !important;
      padding: .5rem 1.15rem; border-radius: var(--pill); background: var(--blue); font-weight: 600;
      box-shadow: var(--shadow-1); transition: background .18s var(--ease), transform .16s var(--spring);
    }
    main p > a[href$="/nova"]:hover, td a[href*="/editar"]:hover { background: var(--blue-600); transform: translateY(-1px); }
    td a[href*="/editar"] { padding: .34rem .85rem; font-size: .9rem; }

    /* ===== hero (preto) ===== */
    .hero {
      background: radial-gradient(120% 140% at 0% 0%, #1b1b1b 0%, var(--black) 55%);
      color: #fff; border-radius: 28px; padding: clamp(2rem, 4vw, 3.4rem); margin-bottom: 2rem;
      box-shadow: var(--shadow-2); overflow: hidden; position: relative;
    }
    .hero .eyebrow { color: #9ec5ff; }
    .hero h1 { color: #fff; max-width: 20ch; }
    .hero p { color: #cfcfcf; max-width: 54ch; font-size: 1.12rem; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: .75rem; margin-top: 1.7rem; }

    /* ===== gradient banner ===== */
    .banner {
      background: var(--grad); color: #fff; border-radius: 20px; padding: 1.3rem 1.7rem; margin-bottom: 1.8rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
      box-shadow: 0 10px 30px rgba(180,60,120,.25);
    }
    .banner h2, .banner p { color: #fff; margin: 0; }
    .banner h2 { font-size: 1.25rem; }
    .banner p { opacity: .92; }

    /* ===== cards / surfaces ===== */
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-card);
      padding: 1.5rem 1.6rem; margin-bottom: 1.4rem; box-shadow: var(--shadow-1);
      transition: transform .22s var(--ease), box-shadow .22s var(--ease);
    }
    .card > :first-child { margin-top: 0; } .card > :last-child { margin-bottom: 0; }
    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); }

    table {
      border-collapse: separate; border-spacing: 0; width: 100%; border-radius: var(--r-card); overflow: hidden;
      background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-1);
    }
    th, td { padding: .8rem .95rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--bg-soft); color: var(--ink-2); font-weight: 700; font-size: .82rem;
      letter-spacing: .04em; text-transform: uppercase; position: sticky; top: 0; }
    tbody tr { transition: background .15s var(--ease); }
    tbody tr:hover { background: #f7f9fc; }
    tr:last-child td { border-bottom: none; }

    pre {
      background: var(--black-2); color: #eaeaea; padding: 1.1rem; border-radius: 14px; overflow: auto;
      line-height: 1.55; font-size: .9rem;
    }
    code { padding: .12rem .4rem; border-radius: 6px; background: #f0f0f0; font-size: .9em; overflow-wrap: anywhere; }
    .erro { color: var(--bad); font-weight: 600; } .sucesso { color: var(--ok); font-weight: 600; }

    /* ===== badges ===== */
    .badge {
      display: inline-flex; align-items: center; gap: .4rem; padding: .2rem .7rem; border-radius: var(--pill);
      font-size: .8rem; font-weight: 600; line-height: 1.5;
      background: #f0f0f0; border: 1px solid var(--border); color: var(--ink-2);
    }
    .badge::before { content: ""; width: 7px; height: 7px; border-radius: 999px; background: currentColor; opacity: .85; flex: none; }
    .badge[data-tone="ok"]   { color: var(--ok);   background: var(--ok-bg);   border-color: var(--ok-brd); }
    .badge[data-tone="warn"] { color: var(--warn); background: var(--warn-bg); border-color: var(--warn-brd); }
    .badge[data-tone="bad"]  { color: var(--bad);  background: var(--bad-bg);  border-color: var(--bad-brd); }

    /* ===== forms ===== */
    form.inline { display: inline; margin: 0; }
    label { display: block; margin: .9rem 0 .3rem; font-weight: 600; color: var(--ink); font-size: .95rem; }
    input[type=text], input[type=password], input[type=date], select, textarea {
      font: inherit; padding: .62rem .8rem; width: 100%; max-width: 440px; box-sizing: border-box;
      border-radius: var(--r-field); border: 1px solid var(--border-strong); background: #fff; color: var(--ink);
      transition: border-color .16s var(--ease), box-shadow .16s var(--ease);
    }
    input:hover:not(:focus):not(:disabled), select:hover:not(:focus):not(:disabled), textarea:hover:not(:focus):not(:disabled) {
      border-color: #b9b9b9;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(20,115,230,.18);
    }
    input:disabled, select:disabled, textarea:disabled, button:disabled, input[type=submit]:disabled {
      opacity: .5; cursor: not-allowed;
    }
    button:disabled:hover, input[type=submit]:disabled:hover { transform: none; background: var(--blue); box-shadow: var(--shadow-1); }
    textarea { min-height: 96px; resize: vertical; line-height: 1.5; }
    /* native <select>: custom caret + readable option popup */
    select {
      appearance: none; -webkit-appearance: none; -moz-appearance: none; padding-right: 2.4rem;
      background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='14'%20height='14'%20viewBox='0%200%2024%2024'%20fill='none'%20stroke='%231f1f1f'%20stroke-width='2.5'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M6%209l6%206%206-6'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right .9rem center; background-size: 14px;
    }
    select option, select optgroup { background-color: #ffffff; color: var(--ink); }
    select option:checked { background-color: var(--blue-tint); font-weight: 600; }

    .filter-form { display: grid; grid-template-columns: minmax(220px, 1fr) 180px auto; gap: .9rem; align-items: end; }
    .actions-row { display: flex; flex-wrap: wrap; gap: .85rem; align-items: center; }
    .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 1rem; }
    .metric {
      display: block; padding: 1.1rem 1.2rem; border-radius: 16px; background: var(--bg-soft);
      border: 1px solid var(--border); text-decoration: none; color: var(--ink-2);
      transition: transform .18s var(--ease), box-shadow .18s var(--ease), border-color .18s var(--ease);
    }
    a.metric:hover { transform: translateY(-3px); box-shadow: var(--shadow-2); border-color: #d7e6fb; }
    .metric strong { display: block; color: var(--blue); font-size: 1.9rem; line-height: 1.1;
      font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -.02em; margin-bottom: .15rem; }
    .text-cell { max-width: 440px; overflow-wrap: anywhere; }
    .wide-field { max-width: 100% !important; }

    @media (max-width: 760px) {
      nav { flex-wrap: wrap; gap: .3rem; padding: .6rem .9rem; }
      .nav-link span { display: none; } .nav-link { padding: .55rem; }
      main { padding: 1.6rem 1rem 3rem; }
      .filter-form { grid-template-columns: 1fr; }
      table { font-size: .92rem; } th, td { padding: .65rem .7rem; }
      .banner { flex-direction: column; align-items: flex-start; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
  </style>
</head>
<body>
  {% if request.session.get("admin") %}
  {% set path = request.url.path %}
  <nav>
    <a class="brand" href="/admin" aria-label="Obrabot — início">Obra<span class="dot">bot</span></a>
    <a class="nav-link" href="/admin" {% if path == "/admin" %}aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      <span>Dashboard</span>
    </a>
    <a class="nav-link" href="/admin/obras" {% if path.startswith("/admin/obras") %}aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9v.01M9 12v.01M9 15v.01"/></svg>
      <span>Obras</span>
    </a>
    <a class="nav-link" href="/admin/dia-obra" {% if path.startswith("/admin/dia-obra") %}aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Dia da Obra</span>
    </a>
    <a class="nav-link" href="/admin/entradas" {% if path.startswith("/admin/entradas") %}aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16v12H5.2L4 17.5z"/><path d="M8 9h8M8 12h5"/></svg>
      <span>Entradas</span>
    </a>
    <a class="nav-link" href="/admin/documentos" {% if path.startswith("/admin/documentos") %}aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>
      <span>Documentos</span>
    </a>
    <span class="spacer"></span>
    <form method="post" action="/admin/logout">
      <button type="submit">Sair</button>
    </form>
  </nav>
  {% endif %}
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    // progressive enhancement: tone status badges by their text (color is not the only cue — dot + text remain)
    (function () {
      var OK = /(aprov|public|conclu|ativ|sucesso|done|complete|finaliz|ok\b)/i;
      var BAD = /(erro|reprov|fail|falh|inativ|cancel|rejeit|negad)/i;
      var WARN = /(pend|aguard|process|queue|fila|review|revis|rascunho|draft|received|novo)/i;
      function paint(root) {
        (root || document).querySelectorAll('.badge:not([data-tone])').forEach(function (b) {
          var t = b.textContent.trim();
          if (OK.test(t)) b.dataset.tone = 'ok';
          else if (BAD.test(t)) b.dataset.tone = 'bad';
          else if (WARN.test(t)) b.dataset.tone = 'warn';
        });
      }
      paint(document);
      document.body.addEventListener('htmx:afterSwap', function (e) { paint(e.target); });
    })();
  </script>
</body>
</html>
