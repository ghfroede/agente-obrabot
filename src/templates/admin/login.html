{% extends "admin/base.html" %}
{% block title %}Login — Painel Obrabot{% endblock %}
{% block content %}
<div style="min-height: 70dvh; display: grid; place-items: center;">
  <div class="card" style="width: 100%; max-width: 420px; text-align: center;">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--brand-2)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="width:54px;height:54px;margin-bottom:.5rem;">
      <path d="M2 18h20"/><path d="M4 18V9a8 8 0 0 1 16 0v9"/><path d="M12 4V2"/><path d="M12 9v9"/>
    </svg>
    <h1 style="margin:.1rem 0 .2rem;">Painel Obrabot</h1>
    <p class="muted" style="margin:0 0 1.2rem;">Acesso restrito à equipe</p>
    {% if erro %}<p class="erro" role="alert">{{ erro }}</p>{% endif %}
    <form method="post" action="/admin/login" style="text-align: left;">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" autocomplete="current-password" autofocus required />
      <p style="margin-bottom:0;"><button type="submit" style="width:100%;">Entrar</button></p>
    </form>
  </div>
</div>
{% endblock %}
