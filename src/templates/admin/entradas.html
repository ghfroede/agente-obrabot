{% extends "admin/base.html" %}
{% block title %}Entradas — Painel Obrabot{% endblock %}
{% block content %}
<h1>Entradas</h1>
<form method="get" action="/admin/entradas">
  <label for="status">Filtrar por status</label>
  <select id="status" name="status" onchange="this.form.submit()">
    <option value="">Todos</option>
    {% for s in statuses %}
      <option value="{{ s }}" {% if status_atual == s %}selected{% endif %}>{{ s }}</option>
    {% endfor %}
  </select>
  <noscript><button type="submit">Filtrar</button></noscript>
</form>
<div id="entradas-resultado">
  {% include "admin/_entradas_table.html" %}
</div>
{% endblock %}
